server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression des assets texte
    gzip on;
    gzip_types text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Le jeu sauvegarde dans le localStorage du navigateur : on évite le cache
    # navigateur pour que les mises à jour du code soient prises en compte.
    location ~* \.(js|css|html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires -1;
    }
}
